name: Release Node.js

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.settings.target }})
    runs-on: ${{ matrix.settings.host }}
    strategy:
      fail-fast: false
      matrix:
        settings:
          - host: ubuntu-latest  target: x86_64-unknown-linux-gnu
          - host: ubuntu-latest  target: aarch64-unknown-linux-gnu
          - host: macos-latest   target: x86_64-apple-darwin
          - host: macos-latest   target: aarch64-apple-darwin
          - host: windows-latest target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.settings.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install napi-rs CLI
        run: npm install -g @napi-rs/cli

      - name: Build
        run: cd bindings/nodejs && napi build --platform --release --target ${{ matrix.settings.target }}

      - uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.settings.target }}
          path: bindings/nodejs/*.node

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - uses: actions/download-artifact@v4
        with:
          pattern: bindings-*
          merge-multiple: true
          path: bindings/nodejs

      - name: Publish
        run: cd bindings/nodejs && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
